<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirControl Spatial UI</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --primary: #00ffcc;
      --bg: #0a0a12;
      --panel: rgba(16, 16, 28, 0.75);
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }

    /* Container holding the interface layers */
    #app-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 1280px;
      max-height: 720px;
      aspect-ratio: 16/9;
      background: #000;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border-radius: 12px;
      overflow: hidden;
    }

    #webcam {
      display: none;
    }

    /* Mirror the tracking canvas for natural interaction */
    #output_canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      object-fit: cover;
      z-index: 1;
    }

    /* HUD Dashboard Overlay */
    .hud-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      background: var(--panel);
      padding: 15px 25px;
      border-radius: 8px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 2;
      pointer-events: none;
    }

    .hud-overlay h1 {
      margin: 0;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--primary);
    }

    .status-text {
      font-size: 0.85rem;
      color: #8a8a9e;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <div id="app-container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
    
    <div class="hud-overlay">
      <h1>AirControl System</h1>
      <div id="status" class="status-text">System Ready. Raise hand to initiate.</div>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusDisplay = document.getElementById('status');

    // Define virtual buttons directly in workspace coordinates (pixels)
    const buttons = [
      { id: 'btn1', x: 150, y: 100, width: 220, height: 80, label: 'Action A', color: '#00ffcc', active: false },
      { id: 'btn2', x: 910, y: 100, width: 220, height: 80, label: 'Action B', color: '#ff3366', active: false }
    ];

    // Simple collision check script
    function isInside(px, py, btn) {
      return px > btn.x && px < btn.x + btn.width && py > btn.y && py < btn.y + btn.height;
    }

    function onResults(results) {
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // Draw live background stream frame
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      
      // Render interactive virtual boxes
      buttons.forEach(btn => {
        canvasCtx.fillStyle = btn.active ? btn.color : 'rgba(16, 16, 28, 0.6)';
        canvasCtx.strokeStyle = btn.color;
        canvasCtx.lineWidth = 3;
        
        // Draw Button Shape
        canvasCtx.beginPath();
        canvasCtx.roundRect(btn.x, btn.y, btn.width, btn.height, 8);
        canvasCtx.fill();
        canvasCtx.stroke();

        // Draw Button Text
        canvasCtx.fillStyle = btn.active ? '#000' : '#fff';
        canvasCtx.font = 'bold 18px sans-serif';
        canvasCtx.textAlign = 'center';
        canvasCtx.textBaseline = 'middle';
        canvasCtx.fillText(btn.label, btn.x + btn.width/2, btn.y + btn.height/2);
      });

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        statusDisplay.innerText = "Tracking Object: Active";
        statusDisplay.style.color = "#00ffcc";

        for (const landmarks of results.multiHandLandmarks) {
          // Track index finger tip (Landmark 8)
          // Flip X axis back inside canvas math to compensate for visual mirror transform
          const pointerX = (1 - landmarks[8].x) * canvasElement.width;
          const pointerY = landmarks[8].y * canvasElement.height;

          // Track thumb tip (Landmark 4) for pinch detection
          const thumbX = (1 - landmarks[4].x) * canvasElement.width;
          const thumbY = landmarks[4].y * canvasElement.height;

          // Calculate distance for pinch click
          const distance = Math.hypot(pointerX - thumbX, pointerY - thumbY);
          const isPinching = distance < 40; // Pixel distance threshold

          buttons.forEach(btn => {
            if (isInside(pointerX, pointerY, btn)) {
              btn.active = true;
              if (isPinching) {
                statusDisplay.innerText = `Triggered: ${btn.label}!`;
                // Add your custom logic here (e.g., fetch API endpoints or play sound)
              }
            } else {
              btn.active = false;
            }
          });

          // Draw neon targeting reticle at finger pointer tip
          canvasCtx.beginPath();
          canvasCtx.arc(pointerX, pointerY, isPinching ? 8 : 14, 0, 2 * Math.PI);
          canvasCtx.strokeStyle = isPinching ? '#ff3366' : varAlpha('--primary', 0.8);
          canvasCtx.lineWidth = 4;
          canvasCtx.stroke();
        }
      } else {
        statusDisplay.innerText = "System Ready. Raise hand to initiate.";
        statusDisplay.style.color = "#8a8a9e";
        buttons.forEach(btn => btn.active = false);
      }
    }

    function varAlpha(variable, alpha) {
      return `rgba(0, 255, 204, ${alpha})`;
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await hands.send({image: videoElement}); },
      width: 1280,
      height: 720
    });
    camera.start();

    canvasElement.width = 1280;
    canvasElement.height = 720;
  </script>
</body>
</html>
